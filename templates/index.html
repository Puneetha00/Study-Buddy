<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Buddy</title>
    <!-- We use the absolute path to ensure it loads -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <h2 style="color: #a78bfa;">Study Buddy 📚</h2>
            <button class="btn-tool" onclick="fetchAI('timetable')">📅 Timetable</button>
            <button class="btn-tool" onclick="fetchAI('quiz')">📝 Practice Quiz</button>
            <button class="btn-tool" onclick="fetchAI('summary')">📖 Quick Summary</button>
            <button class="btn-tool" onclick="fetchAI('resources')">💡 Key Concepts</button>
        </aside>

        <main class="content-area">
            <h1>Engineer's Dashboard</h1>
            <input type="text" id="topic" placeholder="Enter engineering topic...">
            <div id="loader" style="display:none; color: #a78bfa; margin-top:10px;">Analyzing... ✨</div>
            <div id="output" class="output-box">Your study content will appear here.</div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
