<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Buddy 📚</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
<body>
    <!-- Inside the Sidebar of index.html -->
<div class="sidebar">
    <h2>Study Buddy 🚀</h2>
    <button class="nav-btn" onclick="loadTool('plan')">📅 Study Plan</button>
    <button class="nav-btn" onclick="loadTool('quiz')">📝 Take Quiz</button>
    <button class="nav-btn" onclick="loadTool('summary')">📖 Summary</button>
    <button class="nav-btn" onclick="loadTool('resources')">🔗 Resources</button>
</div>

    <div class="main-content">
        <input type="text" id="topic" placeholder="Enter engineering topic (e.g., Fluid Mechanics)...">
        <div id="display-area" class="content-box">
            <p>Welcome! Enter a topic, then select an option from the sidebar to begin. 🎓</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
